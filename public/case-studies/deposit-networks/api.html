<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DepositNet Platform API — Concept Specification</title>
    <meta
      name="description"
      content="Concept OpenAPI 3.1 specification for a reciprocal-deposit network platform. Part of the Deposit Networks category case study."
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body { margin: 0; padding: 0; }
      body.theme-light { background: #ffffff; color: #111827; }
      body.theme-dark  { background: #0b1220; color: #e5edff; }

      .topbar {
        position: sticky; top: 0; z-index: 100;
        padding: 12px 24px;
        display: flex; align-items: center; justify-content: space-between;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      body.theme-light .topbar {
        background: #ffffff; border-bottom: 1px solid #e5e7eb; color: #111827;
      }
      body.theme-dark .topbar {
        background: #0b1220; border-bottom: 1px solid #1f2c4a; color: #e5edff;
      }

      .topbar .brand {
        display: flex; align-items: center; gap: 10px;
        font-weight: 600; letter-spacing: 0.02em;
      }
      .topbar .brand .dot {
        width: 10px; height: 10px; background: #0d9488; border-radius: 2px;
      }
      body.theme-dark .topbar .brand .dot { background: #5eead4; }
      .topbar .brand .sub {
        font-weight: 400; font-size: 11px;
        text-transform: uppercase; letter-spacing: 0.12em; margin-left: 4px;
      }
      body.theme-light .topbar .brand .sub { color: #6b7280; }
      body.theme-dark  .topbar .brand .sub { color: #8094bd; }

      .topbar .links { display: flex; gap: 18px; font-size: 13px; align-items: center; }
      .topbar a { text-decoration: none; transition: color 0.15s; }
      body.theme-light .topbar a { color: #6b7280; }
      body.theme-light .topbar a:hover { color: #0d9488; }
      body.theme-dark  .topbar a { color: #8094bd; }
      body.theme-dark  .topbar a:hover { color: #5eead4; }

      .theme-toggle {
        background: transparent; border: 1px solid currentColor;
        border-radius: 6px; padding: 4px 10px; font: inherit; font-size: 12px;
        cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
      }
      body.theme-light .theme-toggle { color: #6b7280; border-color: #d1d5db; }
      body.theme-light .theme-toggle:hover { color: #0d9488; border-color: #0d9488; }
      body.theme-dark  .theme-toggle { color: #8094bd; border-color: #1f2c4a; }
      body.theme-dark  .theme-toggle:hover { color: #5eead4; border-color: #5eead4; }
    </style>
  </head>
  <body class="theme-light">
    <div class="topbar">
      <div class="brand">
        <span class="dot"></span>
        DepositNet
        <span class="sub">Platform API · Concept</span>
      </div>
      <div class="links">
        <a href="/projects/deposit-networks/case-study">← Case Study</a>
        <a href="/case-studies/deposit-networks/mockup/index.html" target="_blank" rel="noopener">Concept UI</a>
        <a href="/case-studies/deposit-networks/openapi.yaml" target="_blank" rel="noopener">Raw YAML</a>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme">
          <span id="theme-toggle-label">Dark</span>
        </button>
      </div>
    </div>

    <div id="redoc-container"></div>
    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
    <script>
      const SPEC_URL = "/case-studies/deposit-networks/openapi.yaml";

      const themes = {
        light: {
          colors: {
            primary: { main: "#0d9488" },
            success: { main: "#059669" },
            warning: { main: "#d97706" },
            error:   { main: "#dc2626" },
            text:    { primary: "#111827", secondary: "#4b5563" },
            http: {
              get: "#059669", post: "#0d9488", put: "#d97706",
              delete: "#dc2626", patch: "#7c3aed"
            }
          },
          typography: {
            fontFamily: "Inter, ui-sans-serif, system-ui, -apple-system, sans-serif",
            fontSize: "15px",
            headings: { fontFamily: "Inter, ui-sans-serif, system-ui, sans-serif", fontWeight: "700" },
            code: {
              fontFamily: "'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace",
              fontSize: "13px"
            }
          },
          sidebar:    { width: "260px" },
          rightPanel: { width: "40%" }
        },
        dark: {
          colors: {
            primary: { main: "#5eead4" },
            success: { main: "#34d399" },
            warning: { main: "#fbbf24" },
            error:   { main: "#f87171" },
            text:    { primary: "#e5edff", secondary: "#b3c0dc" },
            border:  { dark: "#1f2c4a", light: "#1f2c4a" },
            http: {
              get: "#34d399", post: "#5eead4", put: "#fbbf24",
              delete: "#f87171", patch: "#a78bfa"
            }
          },
          typography: {
            fontFamily: "Inter, ui-sans-serif, system-ui, -apple-system, sans-serif",
            fontSize: "15px",
            headings: { fontFamily: "Inter, ui-sans-serif, system-ui, sans-serif", fontWeight: "700" },
            code: {
              fontFamily: "'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace",
              fontSize: "13px",
              color: "#5eead4",
              backgroundColor: "#162038"
            },
            links: { color: "#5eead4", visited: "#5eead4", hover: "#99f6e4" }
          },
          sidebar:    { backgroundColor: "#0f1729", textColor: "#e5edff", width: "260px" },
          rightPanel: { backgroundColor: "#0a1120", textColor: "#e5edff", width: "40%" },
          codeBlock:  { backgroundColor: "#0a1120" },
          schema: {
            nestedBackground: "#111a2e",
            linesColor: "#1f2c4a",
            typeNameColor: "#8094bd",
            typeTitleColor: "#e5edff",
            requireLabelColor: "#f87171"
          }
        }
      };

      function renderRedoc(mode) {
        const container = document.getElementById("redoc-container");
        container.innerHTML = "";
        Redoc.init(
          SPEC_URL,
          { hideDownloadButton: false, disableSearch: false, expandResponses: "200,201", theme: themes[mode] },
          container
        );
      }

      function applyTheme(mode) {
        document.body.classList.remove("theme-light", "theme-dark");
        document.body.classList.add("theme-" + mode);
        document.getElementById("theme-toggle-label").textContent = mode === "light" ? "Dark" : "Light";
        try { localStorage.setItem("depositnet-api-theme", mode); } catch (e) {}
        renderRedoc(mode);
      }

      const saved = (function () {
        try { return localStorage.getItem("depositnet-api-theme"); } catch (e) { return null; }
      })();
      applyTheme(saved === "dark" ? "dark" : "light");

      document.getElementById("theme-toggle").addEventListener("click", function () {
        const current = document.body.classList.contains("theme-dark") ? "dark" : "light";
        applyTheme(current === "dark" ? "light" : "dark");
      });
    </script>
  </body>
</html>
