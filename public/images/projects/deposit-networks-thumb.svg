<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Deposit Networks case study thumbnail">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#101a30"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="400" cy="260" r="260" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#1e2a44" stroke-width="1" opacity="0.6">
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="440" x2="800" y2="440"/>
  </g>

  <!-- network graph: 5 nodes, connected -->
  <g>
    <line x1="200" y1="260" x2="400" y2="180" stroke="url(#accent)" stroke-width="2" opacity="0.75"/>
    <line x1="400" y1="180" x2="600" y2="260" stroke="url(#accent)" stroke-width="2" opacity="0.75"/>
    <line x1="200" y1="260" x2="400" y2="340" stroke="url(#accent)" stroke-width="2" opacity="0.75"/>
    <line x1="400" y1="340" x2="600" y2="260" stroke="url(#accent)" stroke-width="2" opacity="0.75"/>
    <line x1="200" y1="260" x2="600" y2="260" stroke="url(#accent)" stroke-width="2" opacity="0.4" stroke-dasharray="4 4"/>
    <line x1="400" y1="180" x2="400" y2="340" stroke="url(#accent)" stroke-width="2" opacity="0.4" stroke-dasharray="4 4"/>
  </g>
  <g fill="#0b1220" stroke="url(#accent)" stroke-width="3">
    <circle cx="200" cy="260" r="18"/>
    <circle cx="400" cy="180" r="18"/>
    <circle cx="600" cy="260" r="18"/>
    <circle cx="400" cy="340" r="18"/>
    <circle cx="400" cy="260" r="22" fill="#22d3ee" stroke="#22d3ee"/>
  </g>

  <!-- label -->
  <text x="400" y="60" fill="#e2e8f0" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="28" font-weight="700" text-anchor="middle" letter-spacing="1">
    DEPOSIT NETWORKS
  </text>
  <text x="400" y="88" fill="#94a3b8" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="14" font-weight="400" text-anchor="middle" letter-spacing="2">
    CATEGORY CASE STUDY · RECIPROCAL LIQUIDITY INFRASTRUCTURE
  </text>

  <text x="400" y="430" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" text-anchor="middle">
    $2.3T · EGRRCPA · mTLS · ledger-first · three personas
  </text>
</svg>
